services:
  - type: web
    name: vetsync-v4
    env: python
    buildCommand: "./render-build.sh"
    startCommand: "gunicorn run:app"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vetsync-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENFORCE_HTTPS
        value: "true"
      - key: AUTO_CREATE_DB
        value: "true"

databases:
  - name: vetsync-db
    plan: free
