<!-- FORGOT PASSWORD MODAL -->
<div id="forgotPasswordModal" class="otp-modal">
    <div class="otp-modal-content">
        <!-- STEP 1: EMAIL INPUT -->
        <div id="stepEmail" class="reset-step">
            <div class="otp-header">
                <span class="otp-icon">🔑</span>
                <h2>Forgot Password?</h2>
                <p>Enter your email address and we'll send you an OTP to reset your password.</p>
            </div>
            <div class="otp-body" style="margin-top: 1.5rem;">
                <div class="auth-field" style="margin-bottom: 1.5rem;">
                    <input type="email" id="resetEmail" placeholder="Enter your registered email" required style="width: 100%; padding: 12px 15px; border: 2px solid #e8eef8; border-radius: 12px; font-size: 1rem;">
                </div>
                <p id="stepEmailError" class="otp-error-msg"></p>
                <button id="sendResetOtpBtn" class="btn-verify">Send OTP</button>
            </div>
        </div>

        <!-- STEP 2: OTP INPUT -->
        <div id="stepOtp" class="reset-step" style="display: none;">
            <div class="otp-header">
                <span class="otp-icon">🛡️</span>
                <h2>Verify Identity</h2>
                <p>Please enter the 6-digit code sent to <br><strong id="displayResetEmail"></strong></p>
            </div>
            <div class="otp-body">
                <div class="otp-input-container">
                    <input type="text" maxlength="1" class="reset-otp-input" data-index="0">
                    <input type="text" maxlength="1" class="reset-otp-input" data-index="1">
                    <input type="text" maxlength="1" class="reset-otp-input" data-index="2">
                    <input type="text" maxlength="1" class="reset-otp-input" data-index="3">
                    <input type="text" maxlength="1" class="reset-otp-input" data-index="4">
                    <input type="text" maxlength="1" class="reset-otp-input" data-index="5">
                </div>
                <p id="stepOtpError" class="otp-error-msg"></p>
                <div class="otp-timer">
                    <span>Expires in: </span>
                    <span id="resetCountdown">05:00</span>
                </div>
                <button id="verifyResetOtpBtn" class="btn-verify">Verify Code</button>
                <div class="otp-resend">
                    <button id="resendResetOtpBtn" class="btn-resend" disabled>Resend Code (<span id="resendResetTimer">30</span>s)</button>
                </div>
            </div>
        </div>

        <!-- STEP 3: NEW PASSWORD -->
        <div id="stepPassword" class="reset-step" style="display: none;">
            <div class="otp-header">
                <span class="otp-icon">🆕</span>
                <h2>Reset Password</h2>
                <p>Create a strong new password for your account.</p>
            </div>
            <div class="otp-body" style="margin-top: 1.5rem; text-align: left;">
                <div class="auth-field" style="margin-bottom: 1rem; position: relative;">
                    <input type="password" id="newPassword" placeholder="New Password (min 8 chars)" required style="width: 100%; padding: 12px 15px; border: 2px solid #e8eef8; border-radius: 12px;">
                </div>
                <div class="auth-field" style="margin-bottom: 1.5rem; position: relative;">
                    <input type="password" id="confirmNewPassword" placeholder="Confirm New Password" required style="width: 100%; padding: 12px 15px; border: 2px solid #e8eef8; border-radius: 12px;">
                </div>
                <p id="stepPasswordError" class="otp-error-msg"></p>
                <button id="finalizeResetBtn" class="btn-verify">Reset Password</button>
            </div>
        </div>

        <button class="otp-close" onclick="closeForgotPasswordModal()">&times;</button>
    </div>
</div>

<style>
.reset-step {
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.auth-field input:focus {
    border-color: #00c9b1;
    outline: none;
    box-shadow: 0 0 0 4px rgba(0,201,177,0.1);
}
</style>
