<!-- OTP VERIFICATION MODAL -->
<div id="otpModal" class="otp-modal">
    <div class="otp-modal-content">
        <div class="otp-header">
            <span class="otp-icon">🔐</span>
            <h2>Verify Your Email</h2>
            <p>We've sent a 6-digit code to <br><strong id="displayEmail"></strong></p>
        </div>
        
        <div class="otp-body">
            <div class="otp-input-container">
                <input type="text" maxlength="1" class="otp-input" data-index="0">
                <input type="text" maxlength="1" class="otp-input" data-index="1">
                <input type="text" maxlength="1" class="otp-input" data-index="2">
                <input type="text" maxlength="1" class="otp-input" data-index="3">
                <input type="text" maxlength="1" class="otp-input" data-index="4">
                <input type="text" maxlength="1" class="otp-input" data-index="5">
            </div>
            <p id="otpError" class="otp-error-msg"></p>
            
            <div class="otp-timer">
                <span>Expires in: </span>
                <span id="countdown">05:00</span>
            </div>
        </div>
        
        <div class="otp-footer">
            <button id="verifyOtpBtn" class="btn-verify">Verify Code</button>
            <div class="otp-resend">
                <span>Didn't receive the code?</span>
                <button id="resendOtpBtn" class="btn-resend" disabled>Resend Code (<span id="resendTimer">30</span>s)</button>
            </div>
        </div>
        
        <button class="otp-close" onclick="closeOtpModal()">&times;</button>
    </div>
</div>
